# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=smart-faq-chatbot

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smart_faq_chatbot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Logging Configuration
logging.level.root=INFO
logging.level.com.smartfaq.chatbot=DEBUG

# Claude API Configuration
claude.api.key=
claude.api.url=
claude.api.model=claude-3-sonnet-20240229
claude.api.max-tokens=4096
claude.api.temperature=0.7

# CORS Configuration
app.config.cors.allowed-origins=http://localhost:3000,http://localhost:4200
app.config.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.config.cors.allowed-headers=*
app.config.cors.exposed-headers=Authorization,Content-Type
app.config.cors.allow-credentials=true
app.config.cors.max-age=3600

# File Upload Configuration
app.config.upload.max-file-size=10MB
app.config.upload.max-request-size=10MB
app.config.upload.allowed-extensions=pdf,txt,docx,doc

# Chat Configuration
app.config.chat.max-history-messages=50
app.config.chat.session-timeout-minutes=30
